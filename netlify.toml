[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback for GET only — POST must reach Netlify Forms (not rewritten to index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Method = ["GET", "HEAD"]}

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

